<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts Legacy Speedrunning Notes Template Editor by Awehero</title>
    <link rel="icon" href="images/awehero_icon.png" type="image/png">
    <link rel="stylesheet" type="text/css" href="notes_template_editor.css">
</head>
<body>
    <div id="notesTemplateEditor">
        <div id="notesHeader">
            <div>Notes Template Editor</div>
            <button id="notesClose">✕</button>
        </div>
        <div id="notesMain">    
            <!-- Left Sidebar -->
            <div id="notesSidebar">
                <div class="notesSection">
                    <div class="notesSectionTitle"> Template Parts </div>
                    <div class="templatePart" data-part="title"> 📝 Route Title </div>
                    <div class="templatePart" data-part="block"> 📄 Route Block </div>
                    <div class="templatePart" data-part="blockNotes"> 📄 Route Block + Notes </div>
                    <div class="templatePart" data-part="divider"> ─ Divider </div>
                    <div class="templatePart" data-part="blank"> ⬜ Blank Line </div>
                    <div class="templatePart" data-part="custom"> 💬 Custom Text </div>
                </div>
                <div class="notesSection">
                    <div class="notesSectionTitle"> Placeholders </div>
                    <button class="placeholderButton" data-placeholder="{title}"> {title} </button>
                    <button class="placeholderButton" data-placeholder="{number}"> {number} </button>
                    <button class="placeholderButton" data-placeholder="{name}"> {name} </button>
                    <button class="placeholderButton" data-placeholder="{path}"> {path} </button>
                    <button class="placeholderButton" data-placeholder="{notes}"> {notes} </button>
                    <button class="placeholderButton" data-placeholder="{prefix}"> {prefix} </button>
                    <button class="placeholderButton" data-placeholder="{time}"> {time} </button>
                </div>
                <div class="notesSection">
                    <div class="notesSectionTitle"> Presets </div>
                    <select id="notesPreset">
                        <option>Default</option>
                        <option>Compact</option>
                        <option>Markdown</option>
                        <option>Checklist</option>
                        <option>Detailed</option>
                    </select>
                </div>
            </div>
            <!-- Center -->
            <div id="notesWorkspace">
                <div id="workspaceHeader"> Template </div>
                <div id="workspaceBlocks">
                    <!-- Generated by JS -->
                </div>
            </div>
            <!-- Right -->
            <div id="notesInspector">
                <div id="inspectorHeader"> Editor </div>
                <div id="inspectorEmpty"> Select a template block. </div>
                <div id="inspectorContent" style="display:none;">
                    <label> Name </label>
                    <input id="templateName" type="text">
                    <label> Template </label>
                    <textarea id="templateText" spellcheck="false"></textarea>
                    <div id="templateOptions">
                        <label>
                            <input type="checkbox" id="templateEnabled" checked> Enabled </label>
                    </div>
                </div>
            </div>
        </div>
        <!-- Bottom -->
        <div id="notesBottom">
            <div id="notesPreview">
                <div id="previewHeader"> Live Preview </div>
                <pre id="previewText"></pre>
            </div>
            <div id="notesButtons">
                <button id="notesReset"> Reset </button>
                <button id="notesImport"> Import </button>
                <button id="notesExport"> Export </button>
                <button id="notesSave"> Save </button>
            </div>
        </div>
    </div>
    <script src="notes_template_editor.js"></script>
</body>
</html>
